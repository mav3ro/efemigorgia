<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💀 Vincent de Mour - Poezja - Muzyka - Śmierć</title>
  <meta
    name="description"
    content="Minimalistyczna, ciemna strona Efemigorgii z wyeksponowaną typografią i sekcją hero gotową na zapętlone wideo."
  >
  <link rel="icon" type="image/png" href="assets/images/logow.png">
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="assets/js/main.js" defer></script>
</head>
<body>
  <div class="page-shell">
    <header class="site-header" data-header>
      <nav class="site-nav" aria-label="navigation">
        <div class="nav-cluster nav-cluster--left" aria-label="menu">
          <a class="nav-link" href="index.html">Początek</a>
          <span class="nav-divider" aria-hidden="true">|</span>
          <a class="nav-link" href="tworczosc.html">Twórczość</a>
        </div>

        <a class="nav-logo" href="index.html" aria-label="Efemigorgia">
          <img class="nav-logo__image nav-logo__image--base" src="assets/images/logow.png" alt="">
          <img class="nav-logo__image nav-logo__image--hover" src="assets/images/logor.png" alt="">
        </a>

        <div class="nav-cluster nav-cluster--right" aria-label="Menu po prawej">
          <a class="nav-link" href="efemigorgia.html">Efemigorgia</a>
          <span class="nav-divider" aria-hidden="true">|</span>
          <a class="nav-link" href="de-mour.html">De Mour</a>
        </div>

        <button
          class="nav-toggle"
          type="button"
          aria-label="Otwórz menu"
          aria-expanded="false"
          aria-controls="mobile-menu"
          data-nav-toggle
        >
          <img class="nav-toggle__icon" src="assets/icons/burger.png" alt="">
        </button>
      </nav>

      <div class="mobile-menu" id="mobile-menu" data-mobile-menu>
        <a class="mobile-link" href="index.html" data-mobile-link>Początek</a>
        <a class="mobile-link" href="tworczosc.html" data-mobile-link>Twórczość</a>
        <a class="mobile-link" href="efemigorgia.html" data-mobile-link>Efemigorgia</a>
        <a class="mobile-link" href="de-mour.html" data-mobile-link>De Mour</a>
      </div>
    </header>

    <main class="site-main">
      <section class="hero" id="tworczosc" aria-label="Sekcja wideo">
        <div class="hero__media" data-hero-media>
          <video
            class="hero__video"
            data-hero-video
            autoplay
            muted
            loop
            playsinline
            preload="metadata"
            poster="assets/images/logo.png"
            aria-hidden="true"
          >
            <source src="assets/videos/mour.mp4" type="video/mp4">
          </video>

          <div class="hero__fallback" aria-hidden="true">
            <div class="hero__glow"></div>
            <img class="hero__sigil hero__sigil--ghost" src="assets/images/logo.png" alt="">
            <img class="hero__sigil" src="assets/images/logo.png" alt="">
          </div>

          <div class="hero__shade"></div>
          <div class="hero__noise"></div>
        </div>

      </section>
    </main>

    <footer class="site-footer">
      <p class="site-footer__item">&copy; <span data-year></span><span> | </span><span>Made by VDM</span><br><span>My own skill, Codex and inhuman anger</span></p>

      <div class="site-footer__social" aria-label="Social media">
        <button class="icon-button" type="button" data-contact-open aria-label="Kontakt">
          <img src="assets/icons/email.png" alt="">
        </button>

        <a class="icon-button" href="https://www.instagram.com/vincentdemour/" target="_blank" rel="noreferrer" aria-label="Instagram">
          <img src="assets/icons/instagram.png" alt="">
        </a>

        <a class="icon-button" href="#" target="_blank" rel="noreferrer" aria-label="TikTok">
          <img src="assets/icons/tiktok.png" alt="">
        </a>
      </div>

      <p class="site-footer__item site-footer__item--right"><button class="site-footer__note-button" type="button" data-note-open>Notatka dla poetów</button><span> | </span><span>All Rights Reserved</span></p>
    </footer>

  <div class="contact-modal" data-contact-modal hidden>
    <div class="contact-modal__backdrop" data-contact-close></div>
    <div
      class="contact-modal__dialog"
      role="dialog"
      aria-modal="true"
      aria-label="Formularz kontaktowy"
    >
      <button class="contact-modal__close" type="button" data-contact-close aria-label="Zamknij formularz">
        <span aria-hidden="true">+</span>
      </button>

      <form class="contact-form" data-contact-form data-contact-email="hrabiademour@gmail.com">
        <label class="contact-form__field">
          <span>Imię</span>
          <input type="text" name="name" placeholder="Twoje imię" required>
        </label>

        <label class="contact-form__field">
          <span>E-mail</span>
          <input type="email" name="email" placeholder="twoj@email.com" required>
        </label>

        <label class="contact-form__field">
          <span>Temat</span>
          <input type="text" name="subject" placeholder="Temat wiadomości" required>
        </label>

        <label class="contact-form__field">
          <span>Wiadomość</span>
          <textarea name="message" rows="6" placeholder="Treść wiadomości" required></textarea>
        </label>

        <button class="contact-form__submit" type="submit">Wyślij</button>
      </form>
    </div>
  </div>

  <div class="contact-modal note-modal" data-note-modal hidden>
    <div class="contact-modal__backdrop" data-note-close></div>
    <div
      class="contact-modal__dialog note-modal__dialog"
      role="dialog"
      aria-modal="true"
      aria-label="Notatka dla poetów"
    >
      <button class="contact-modal__close note-modal__close" type="button" data-note-close aria-label="Zamknij notatkę">
        <span aria-hidden="true">×</span>
      </button>

      <div class="note-modal__section">
        <div class="note-modal__text">
          <p>Pamiętaj!</p> 
          <p>Pisząc wiersz nie wskazuj bezpośrednio o czym on jest.</p>
          <p>Na przykład:</p>
          <p>Lubię czarne<br>Smukłe, głośne</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
