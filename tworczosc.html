  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="assets/js/main.js" defer></script>
</head>
<body>
  <div class="page-shell">
    <header class="site-header" data-header>
      <nav class="site-nav" aria-label="navigation">
        <div class="nav-cluster nav-cluster--left" aria-label="menu">
          <a class="nav-link" href="index.html">Początek</a>

        <a class="nav-logo" href="index.html" aria-label="Efemigorgia">
          <img class="nav-logo__image nav-logo__image--base" src="assets/images/logow.png" alt="">
          <img class="nav-logo__image nav-logo__image--hover" src="assets/images/logor.png" alt="">
        </a>

        <div class="nav-cluster nav-cluster--right" aria-label="Menu po prawej">
          <a class="nav-link" href="efemigorgia.html">Efemigorgia</a>
          <span class="nav-divider" aria-hidden="true">|</span>
          <a class="nav-link" href="de-mour.html">De Mour</a>
        </div>

        <button
          class="nav-toggle"
          type="button"
          aria-label="Otwórz menu"
          aria-expanded="false"
          aria-controls="mobile-menu"
          data-nav-toggle
        >
          <img class="nav-toggle__icon" src="assets/icons/burger.png" alt="">
        </button>
      </nav>

      <div class="mobile-menu" id="mobile-menu" data-mobile-menu>
        <a class="mobile-link" href="index.html" data-mobile-link>Początek</a>
        <a class="mobile-link" href="tworczosc.html" data-mobile-link>Twórczość</a>
        <a class="mobile-link" href="efemigorgia.html" data-mobile-link>Efemigorgia</a>
        <a class="mobile-link" href="de-mour.html" data-mobile-link>De Mour</a>
      </div>
    </header>

    <main class="site-main site-main--gallery">
      <section class="gallery-grid" aria-label="Galeria twórczości">
        <article class="gallery-tile gallery-tile--swap">
          <a class="gallery-tile__link" href="milosc.html" aria-label="Miłość">
            <img class="gallery-tile__image gallery-tile__image--base" src="assets/images/love.png" alt="Miłość">
            <img class="gallery-tile__image gallery-tile__image--hover" src="assets/images/lover.png" alt="Miłość">
          </a>
        </article>
        <article class="gallery-tile gallery-tile--swap">
          <a class="gallery-tile__link" href="pustka.html" aria-label="Pustka">
            <img class="gallery-tile__image gallery-tile__image--base" src="assets/images/void.png" alt="Pustka">
            <img class="gallery-tile__image gallery-tile__image--hover" src="assets/images/voidr.png" alt="Pustka">
          </a>
          </article>
        <article class="gallery-tile gallery-tile--swap">
          <a class="gallery-tile__link" href="chec.html" aria-label="Chęć">
            <img class="gallery-tile__image gallery-tile__image--base" src="assets/images/will.png" alt="Chęć">
            <img class="gallery-tile__image gallery-tile__image--hover" src="assets/images/willr.png" alt="Chęć">
          </a>
        </article>
        <article class="gallery-tile gallery-tile--swap">
          <a class="gallery-tile__link" href="erotyzm.html" aria-label="Erotyzm">
            <img class="gallery-tile__image gallery-tile__image--base" src="assets/images/passion.png" alt="Erotyzm">
            <img class="gallery-tile__image gallery-tile__image--hover" src="assets/images/passionr.png" alt="Erotyzm">
          </a>
        </article>
        <article class="gallery-tile gallery-tile--swap">
          <a class="gallery-tile__link" href="slonce.html" aria-label="Słońce">
            <img class="gallery-tile__image gallery-tile__image--base" src="assets/images/sun.png" alt="Słońce">
            <img class="gallery-tile__image gallery-tile__image--hover" src="assets/images/sunr.png" alt="Słońce">
          </a>
        </article>
        <article class="gallery-tile gallery-tile--swap">
          <a class="gallery-tile__link" href="smierc.html" aria-label="Śmierć">
            <img class="gallery-tile__image gallery-tile__image--base" src="assets/images/death.png" alt="Śmierć">
            <img class="gallery-tile__image gallery-tile__image--hover" src="assets/images/deathr.png" alt="Śmierć">
          </a>
        </article>
        <article class="gallery-tile gallery-tile--swap">
          <a class="gallery-tile__link" href="przeklenstwo.html" aria-label="Przekleństwo">
            <img class="gallery-tile__image gallery-tile__image--base" src="assets/images/curse.png" alt="Przekleństwo">
            <img class="gallery-tile__image gallery-tile__image--hover" src="assets/images/curser.png" alt="Przekleństwo">
          </a>
        </article>
        <article class="gallery-tile gallery-tile--swap">
          <a class="gallery-tile__link" href="krzyk.html" aria-label="Dom">
            <img class="gallery-tile__image gallery-tile__image--base" src="assets/images/scream.png" alt="Dom">
            <img class="gallery-tile__image gallery-tile__image--hover" src="assets/images/screamr.png" alt="Dom">
          </a>
        </article>
        <article class="gallery-tile gallery-tile--swap">
          <a class="gallery-tile__link" href="dom.html" aria-label="Krzyk">
            <img class="gallery-tile__image gallery-tile__image--base" src="assets/images/home.png" alt="Krzyk">
            <img class="gallery-tile__image gallery-tile__image--hover" src="assets/images/homer.png" alt="Krzyk">
          </a>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <p class="site-footer__item">&copy; <span data-year></span><span> | </span><span>Made by VDM</span><br><span>My own skill, Codex and inhuman anger</span></p>

      <div class="site-footer__social" aria-label="Social media">
        <button class="icon-button" type="button" data-contact-open aria-label="Kontakt">
          <img src="assets/icons/email.png" alt="">
        </button>

        <a class="icon-button" href="https://www.instagram.com/vincentdemour/" target="_blank" rel="noreferrer" aria-label="Instagram">
          <img src="assets/icons/instagram.png" alt="">
        </a>

        <a class="icon-button" href="#" target="_blank" rel="noreferrer" aria-label="TikTok">
          <img src="assets/icons/tiktok.png" alt="">
        </a>
      </div>

      <p class="site-footer__item site-footer__item--right"><button class="site-footer__note-button" type="button" data-note-open>Notatka dla poetów</button><span> | </span><span>All Rights Reserved</span></p>
    </footer>

  <div class="contact-modal" data-contact-modal hidden>
    <div class="contact-modal__backdrop" data-contact-close></div>
    <div
      class="contact-modal__dialog"
      role="dialog"
      aria-modal="true"
      aria-label="Formularz kontaktowy"
    >
      <button class="contact-modal__close" type="button" data-contact-close aria-label="Zamknij formularz">
        <span aria-hidden="true">+</span>
      </button>

      <form class="contact-form" data-contact-form data-contact-email="hrabiademour@gmail.com">
        <label class="contact-form__field">
          <span>Imię</span>
          <input type="text" name="name" placeholder="Twoje imię" required>
        </label>

        <label class="contact-form__field">
          <span>E-mail</span>
          <input type="email" name="email" placeholder="twoj@email.com" required>
        </label>

        <label class="contact-form__field">
          <span>Temat</span>
          <input type="text" name="subject" placeholder="Temat wiadomości" required>
        </label>

        <label class="contact-form__field">
          <span>Wiadomość</span>
          <textarea name="message" rows="6" placeholder="Treść wiadomości" required></textarea>
        </label>

        <button class="contact-form__submit" type="submit">Wyślij</button>
      </form>
    </div>
  </div>

  <div class="contact-modal note-modal" data-note-modal hidden>
    <div class="contact-modal__backdrop" data-note-close></div>
    <div
      class="contact-modal__dialog note-modal__dialog"
      role="dialog"
      aria-modal="true"
      aria-label="Notatka dla poetów"
    >
      <button class="contact-modal__close note-modal__close" type="button" data-note-close aria-label="Zamknij notatkę">
        <span aria-hidden="true">×</span>
      </button>

      <div class="note-modal__section">
        <div class="note-modal__text">
          <p>Pamiętaj!</p> 
          <p>Pisząc wiersz nie wskazuj bezpośrednio o czym on jest.</p>
          <p>Na przykład:</p>
          <p>Lubię czarne<br>Smukłe, głośne</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
